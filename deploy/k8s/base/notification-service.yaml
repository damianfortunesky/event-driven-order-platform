apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: eda-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/example/notification-service:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: eda-platform
spec:
  selector:
    app: notification-service
  ports:
    - port: 80
      targetPort: 8080
