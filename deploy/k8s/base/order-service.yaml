apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  labels:
    app.kubernetes.io/name: order-service
data:
  SERVER_PORT: "8080"
  ORDER_DB_URL: jdbc:postgresql://postgres.order.svc.cluster.local:5432/order_db
  KAFKA_BOOTSTRAP_SERVERS: kafka.kafka.svc.cluster.local:9092
  ORDER_KAFKA_CONSUMER_GROUP: order-service-group
  ORDER_CREATED_TOPIC: orders.order-created.v1
  PAYMENT_PROCESSED_TOPIC: payments.payment-processed.v1
  INVENTORY_PROCESSED_TOPIC: inventory.inventory-processed.v1
---
apiVersion: v1
kind: Secret
metadata:
  name: order-service-secret
  labels:
    app.kubernetes.io/name: order-service
type: Opaque
stringData:
  ORDER_DB_USERNAME: "CHANGE_ME"
  ORDER_DB_PASSWORD: "CHANGE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app.kubernetes.io/name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: order-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-service
    spec:
      containers:
        - name: order-service
          image: ghcr.io/example/order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: order-service-config
            - secretRef:
                name: order-service-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 4
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  labels:
    app.kubernetes.io/name: order-service
spec:
  selector:
    app.kubernetes.io/name: order-service
  ports:
    - name: http
      port: 80
      targetPort: http
