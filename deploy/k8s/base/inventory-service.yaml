apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-service-config
  labels:
    app.kubernetes.io/name: inventory-service
data:
  SERVER_PORT: "8080"
  INVENTORY_DB_URL: jdbc:postgresql://postgres.inventory.svc.cluster.local:5432/inventory_db
  KAFKA_BOOTSTRAP_SERVERS: kafka.kafka.svc.cluster.local:9092
  INVENTORY_KAFKA_CONSUMER_GROUP: inventory-service-group
  PAYMENT_APPROVED_TOPIC: payments.payment-approved.v1
  INVENTORY_RESERVED_TOPIC: inventory.inventory-reserved.v1
  INVENTORY_FAILED_TOPIC: inventory.inventory-failed.v1
---
apiVersion: v1
kind: Secret
metadata:
  name: inventory-service-secret
  labels:
    app.kubernetes.io/name: inventory-service
type: Opaque
stringData:
  INVENTORY_DB_USERNAME: "CHANGE_ME"
  INVENTORY_DB_PASSWORD: "CHANGE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  labels:
    app.kubernetes.io/name: inventory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: ghcr.io/example/inventory-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: inventory-service-config
            - secretRef:
                name: inventory-service-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 4
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  labels:
    app.kubernetes.io/name: inventory-service
spec:
  selector:
    app.kubernetes.io/name: inventory-service
  ports:
    - name: http
      port: 80
      targetPort: http
