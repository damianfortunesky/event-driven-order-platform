spring:
  application:
    name: payment-service
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:postgresql://localhost:5432/payment_db}
    username: ${PAYMENT_DB_USERNAME:payment_user}
    password: ${PAYMENT_DB_PASSWORD:payment_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${PAYMENT_KAFKA_CONSUMER_GROUP:payment-service-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

app:
  payment:
    approval-threshold: ${PAYMENT_APPROVAL_THRESHOLD:1000}
    rejection-percentage: ${PAYMENT_REJECTION_PERCENTAGE:5}
  kafka:
    topics:
      order-created: ${ORDER_CREATED_TOPIC:orders.order-created.v1}
      payment-requested: ${PAYMENT_REQUESTED_TOPIC:payments.payment-requested.v1}
      payment-approved: ${PAYMENT_APPROVED_TOPIC:payments.payment-approved.v1}
      payment-rejected: ${PAYMENT_REJECTED_TOPIC:payments.payment-rejected.v1}
    consumer:
      retry:
        max-attempts: ${PAYMENT_CONSUMER_MAX_ATTEMPTS:4}
        initial-interval-ms: ${PAYMENT_CONSUMER_INITIAL_INTERVAL_MS:500}
        multiplier: ${PAYMENT_CONSUMER_RETRY_MULTIPLIER:2.0}

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%p","service":"${spring.application.name}","correlationId":"%X{correlationId:-}","thread":"%t","logger":"%c{1}","message":"%m"}%n'
