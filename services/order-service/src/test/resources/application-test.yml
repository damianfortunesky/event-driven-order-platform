spring:
  datasource:
    url: jdbc:h2:mem:orderdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}
    consumer:
      group-id: test-order-service-group
      auto-offset-reset: earliest

app:
  kafka:
    topics:
      order-created: orders.order-created.v1
      payment-processed: payments.payment-processed.v1
      inventory-processed: inventory.inventory-processed.v1
