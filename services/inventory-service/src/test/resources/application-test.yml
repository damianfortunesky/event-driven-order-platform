spring:
  datasource:
    url: jdbc:h2:mem:inventorytest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}
    consumer:
      group-id: inventory-service-test-group
      auto-offset-reset: earliest

app:
  kafka:
    consumer:
      retry:
        max-attempts: 2
        initial-interval-ms: 10
        multiplier: 1.0
